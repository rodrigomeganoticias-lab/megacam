<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a234c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MegaCam">
<title>MegaCam — Meganoticias</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0a234c; --red:#E30613; --gold:#FFD100; --white:#fff;
  --gray4:#9aa0ab; --gray6:#5f6571; --success:#22c55e;
  --fd:"Barlow Condensed",sans-serif; --fb:"Barlow",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:var(--fb);background:var(--navy);color:var(--white);min-height:100dvh;overflow-x:hidden;user-select:none;}

/* GATE */
#gate{position:fixed;inset:0;z-index:1000;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;transition:opacity 0.4s;}
#gate.hidden{opacity:0;pointer-events:none;}
.gate-logo{width:72px;height:72px;background:var(--red);border-radius:16px;display:flex;align-items:center;justify-content:center;margin-bottom:1.5rem;box-shadow:0 8px 32px rgba(227,6,19,0.4);}
.gate-title{font-family:"Barlow Condensed",sans-serif;font-size:2.2rem;font-weight:800;letter-spacing:0.05em;margin-bottom:0.25rem;}
.gate-sub{font-size:0.85rem;color:var(--gray4);margin-bottom:2rem;text-transform:uppercase;letter-spacing:0.1em;}
.gate-err{background:rgba(227,6,19,0.15);border:1px solid rgba(227,6,19,0.4);border-radius:10px;padding:0.75rem 1.25rem;font-size:0.85rem;color:#ff6b6b;margin-bottom:1rem;display:none;}
.gate-err.show{display:block;}
.pin-wrap{width:100%;max-width:280px;}
.pin-input{width:100%;background:rgba(255,255,255,0.08);border:1.5px solid rgba(255,255,255,0.15);border-radius:10px;padding:0.85rem 1rem;color:white;font-family:"Barlow Condensed",sans-serif;font-size:1.6rem;font-weight:700;letter-spacing:0.3em;text-align:center;outline:none;margin-bottom:0.75rem;display:block;}
.pin-btn{width:100%;padding:0.85rem;background:var(--red);border:none;border-radius:10px;color:white;font-family:"Barlow Condensed",sans-serif;font-size:1.1rem;font-weight:800;letter-spacing:0.08em;cursor:pointer;}

/* APP */
#app{display:none;flex-direction:column;min-height:100dvh;}
#app.visible{display:flex;}

/* HEADER */
.hdr{background:var(--navy);padding:0.75rem 1.25rem;display:flex;align-items:center;gap:0.6rem;border-bottom:2px solid rgba(255,209,0,0.2);position:sticky;top:0;z-index:100;}
.hdr-mark{width:30px;height:30px;background:var(--red);border-radius:7px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hdr-title{font-family:"Barlow Condensed",sans-serif;font-size:1.25rem;font-weight:800;letter-spacing:0.04em;}
.hdr-title span{color:var(--gold);}

/* TABS */
.tabs{display:grid;grid-template-columns:1fr 1fr;background:rgba(255,255,255,0.05);margin:0.75rem 1rem;border-radius:12px;padding:3px;gap:3px;}
.tab{padding:0.6rem;border:none;border-radius:9px;font-family:"Barlow Condensed",sans-serif;font-size:0.95rem;font-weight:700;letter-spacing:0.03em;cursor:pointer;color:var(--gray4);background:transparent;transition:all 0.2s;}
.tab.active{background:var(--red);color:var(--white);box-shadow:0 2px 12px rgba(227,6,19,0.35);}

/* CONTENT */
.content{flex:1;padding:0 1rem 1.5rem;overflow-y:auto;}
.slabel{font-family:"Barlow Condensed",sans-serif;font-size:0.68rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--gold);margin-bottom:0.5rem;margin-top:1rem;display:block;}

/* PRESETS */
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;}
.pbtn{background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);border-radius:11px;padding:0.65rem 0.5rem;cursor:pointer;color:var(--white);display:flex;align-items:center;gap:0.5rem;transition:all 0.18s;}
.pbtn.active{background:rgba(255,209,0,0.12);border-color:var(--gold);}
.pthumb{flex-shrink:0;border-radius:4px;background:rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:0.5rem;color:var(--gray4);font-family:"Barlow Condensed",sans-serif;font-weight:600;}
.pname{font-family:"Barlow Condensed",sans-serif;font-size:0.85rem;font-weight:700;line-height:1.1;}
.pdims{font-size:0.65rem;color:var(--gray4);margin-top:0.1rem;}

/* CANVAS ZONE */
.czone{background:rgba(255,255,255,0.04);border:2px dashed rgba(255,255,255,0.15);border-radius:14px;overflow:hidden;position:relative;display:flex;align-items:center;justify-content:center;margin-top:0.5rem;}
.czone.has-img{border-style:solid;border-color:rgba(255,209,0,0.3);}
.cph{padding:2rem 1rem;text-align:center;pointer-events:none;}
.cph .icon{font-size:2rem;margin-bottom:0.5rem;display:block;}
.cph .lbl{font-family:"Barlow Condensed",sans-serif;font-size:0.95rem;font-weight:700;}
.cph .sub{font-size:0.72rem;color:var(--gray4);margin-top:0.2rem;}
#previewCanvas{width:100%;height:100%;display:none;touch-action:none;}
#previewCanvas.visible{display:block;}

/* CAPTURE BTNS */
.cbtns{display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;margin-top:0.5rem;}
.cbtn{padding:0.7rem;border:none;border-radius:10px;font-family:"Barlow Condensed",sans-serif;font-size:0.9rem;font-weight:700;letter-spacing:0.03em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.35rem;}
.cbtn-cam{background:var(--red);color:var(--white);}
.cbtn-gal{background:rgba(255,255,255,0.1);color:var(--white);}

/* DESIGN EXTRAS */
#designExtras{display:none;}
#designExtras.visible{display:block;}

/* TEXT CONTROLS */
.txt-controls{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;flex-wrap:wrap;}
.align-btns{display:flex;gap:0.3rem;}
.align-btn{width:34px;height:34px;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.12);border-radius:8px;color:var(--white);font-size:0.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.align-btn.active{background:rgba(255,209,0,0.15);border-color:var(--gold);color:var(--gold);}
.size-ctrl{display:flex;align-items:center;gap:0.3rem;margin-left:auto;}
.size-btn{width:34px;height:34px;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.12);border-radius:8px;color:var(--white);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;}
.size-val{font-family:"Barlow Condensed",sans-serif;font-size:0.85rem;font-weight:700;color:var(--gray4);min-width:32px;text-align:center;}
.txt-wrap{position:relative;}
#overlayText{width:100%;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.12);border-radius:10px;padding:0.75rem 1rem;color:var(--white);font-family:"Barlow Condensed",sans-serif;font-size:0.95rem;font-weight:600;resize:none;outline:none;transition:border-color 0.2s;line-height:1.4;}
#overlayText:focus{border-color:var(--gold);}
#overlayText::placeholder{color:var(--gray6);}
.wcount{font-size:0.68rem;color:var(--gray4);text-align:right;margin-top:0.25rem;}
.wcount.warn{color:var(--red);}

/* DRAG HINT */
.drag-hint{font-size:0.72rem;color:var(--gray4);text-align:center;margin-top:0.4rem;display:none;}
.drag-hint.visible{display:block;}

/* SAVE */
.btn-save{width:100%;margin-top:1rem;padding:0.9rem;background:var(--red);color:var(--white);border:none;border-radius:12px;font-family:"Barlow Condensed",sans-serif;font-size:1.1rem;font-weight:800;letter-spacing:0.06em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:0.4rem;box-shadow:0 4px 20px rgba(227,6,19,0.3);}
.btn-save:disabled{background:var(--gray6);box-shadow:none;cursor:default;}

/* TOAST */
#toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%) translateY(20px);background:var(--success);color:var(--white);padding:0.65rem 1.25rem;border-radius:50px;font-family:"Barlow Condensed",sans-serif;font-size:0.9rem;font-weight:700;letter-spacing:0.04em;pointer-events:none;opacity:0;transition:all 0.3s;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* LOADING */
#loading{display:none;position:fixed;inset:0;z-index:500;background:rgba(10,35,76,0.85);align-items:center;justify-content:center;flex-direction:column;gap:1rem;}
#loading.show{display:flex;}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin-txt{font-family:"Barlow Condensed",sans-serif;font-size:0.85rem;font-weight:600;color:var(--gray4);letter-spacing:0.08em;text-transform:uppercase;}

input[type="file"]{display:none;}
</style>
</head>
<body>

<div id="gate">
  <div class="gate-logo">
    <svg viewBox="0 0 44 44" fill="none" width="44" height="44">
      <rect x="4" y="4" width="16" height="16" rx="3" fill="white"/>
      <rect x="24" y="4" width="16" height="16" rx="3" fill="white" opacity="0.6"/>
      <rect x="4" y="24" width="16" height="16" rx="3" fill="white" opacity="0.6"/>
      <rect x="24" y="24" width="16" height="16" rx="3" fill="white" opacity="0.3"/>
    </svg>
  </div>
  <div class="gate-title">MEGA<span style="color:var(--gold)">CAM</span></div>
  <div class="gate-sub">Meganoticias &middot; Uso interno</div>
  <div class="gate-err" id="gateErr">PIN incorrecto</div>
  <div class="pin-wrap">
    <input id="pinInput" class="pin-input" type="password" inputmode="numeric" maxlength="6" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;">
    <button class="pin-btn" id="btnPin">INGRESAR</button>
  </div>
</div>

<div id="loading">
  <div class="spinner"></div>
  <div class="spin-txt">Procesando...</div>
</div>

<div id="app">
  <div class="hdr">
    <div class="hdr-mark">
      <svg viewBox="0 0 20 20" fill="none" width="18" height="18">
        <rect x="2" y="2" width="7" height="7" rx="1.5" fill="white"/>
        <rect x="11" y="2" width="7" height="7" rx="1.5" fill="white" opacity="0.6"/>
        <rect x="2" y="11" width="7" height="7" rx="1.5" fill="white" opacity="0.6"/>
        <rect x="11" y="11" width="7" height="7" rx="1.5" fill="white" opacity="0.3"/>
      </svg>
    </div>
    <div class="hdr-title">MEGA<span>CAM</span></div>
  </div>

  <div class="tabs">
    <button class="tab active" id="tabR">&#9889; MODO RAPIDO</button>
    <button class="tab" id="tabD">&#127912; MODO DISENO</button>
  </div>

  <div class="content">
    <span class="slabel">Formato de salida</span>
    <div class="pgrid" id="presetGrid"></div>

    <span class="slabel">Foto</span>
    <div class="czone" id="czone" style="aspect-ratio:3/2">
      <div class="cph" id="cph">
        <span class="icon">&#128247;</span>
        <div class="lbl">Toca para agregar foto</div>
        <div class="sub">Camara o galeria</div>
      </div>
      <canvas id="previewCanvas"></canvas>
    </div>
    <div class="drag-hint" id="dragHint">&#9757; Arrastra la foto para reencuadrar</div>

    <div class="cbtns">
      <button class="cbtn cbtn-cam" id="btnCam">&#128247; Camara</button>
      <button class="cbtn cbtn-gal" id="btnGal">&#128444; Galeria</button>
    </div>

    <div id="designExtras">
      <span class="slabel">Texto (12-15 palabras)</span>
      <div class="txt-controls">
        <div class="align-btns">
          <button class="align-btn active" id="aLeft" title="Izquierda">&#8676;</button>
          <button class="align-btn" id="aCenter" title="Centro">&#8644;</button>
          <button class="align-btn" id="aRight" title="Derecha">&#8677;</button>
        </div>
        <div class="size-ctrl">
          <button class="size-btn" id="btnSizeDown">&#9660;</button>
          <span class="size-val" id="sizeVal">M</span>
          <button class="size-btn" id="btnSizeUp">&#9650;</button>
        </div>
      </div>
      <div class="txt-wrap">
        <textarea id="overlayText" rows="3" placeholder="Escribe el titular..."></textarea>
      </div>
      <div class="wcount" id="wcount">0 palabras</div>
    </div>

    <button class="btn-save" id="btnSave" disabled>&#128190; GUARDAR EN GALERIA</button>
  </div>
</div>

<div id="toast">Imagen lista</div>
<input type="file" id="inputCam" accept="image/*" capture="environment">
<input type="file" id="inputGal" accept="image/*">

function $(id){ return document.getElementById(id); }

// ── AUTH ──────────────────────────────────────────────────────────────────
function initAuth() {
  if (localStorage.getItem("mc_auth") === "ok") { unlock(); return; }
  $("btnPin").addEventListener("click", doPin);
  $("pinInput").addEventListener("keydown", function(e){ if(e.key==="Enter") doPin(); });
}
function doPin() {
  if ($("pinInput").value.trim() === PIN) {
    localStorage.setItem("mc_auth","ok");
    unlock();
  } else {
    $("gateErr").classList.add("show");
    $("pinInput").value = "";
  }
}
function unlock() {
  var g = $("gate"), a = $("app");
  if (g) g.classList.add("hidden");
  if (a) a.classList.add("visible");
  setTimeout(function(){ if(g&&g.parentNode) g.parentNode.removeChild(g); }, 500);
}

// ── PRESETS ───────────────────────────────────────────────────────────────
function buildPresets() {
  var grid = $("presetGrid"), html = "";
  for (var i=0; i<PRESETS.length; i++) {
    var p = PRESETS[i];
    var r = p.w/p.h;
    var tw = r>=1 ? 38 : Math.round(38*r);
    var th = r<1  ? 38 : Math.round(38/r);
    var act = (PRESET&&PRESET.id===p.id) ? " active" : "";
    html += "<button class='pbtn"+act+"' data-id='"+p.id+"'>"
          + "<div class='pthumb' style='width:"+tw+"px;height:"+th+"px'>"+ratioLabel(p)+"</div>"
          + "<div><div class='pname'>"+p.name+"</div><div class='pdims'>"+p.dims+"</div></div>"
          + "</button>";
  }
  grid.innerHTML = html;
  var bs = grid.querySelectorAll(".pbtn");
  for (var j=0; j<bs.length; j++) {
    bs[j].addEventListener("click", function(){ selectPreset(this.getAttribute("data-id")); });
  }
}
function ratioLabel(p) {
  var r = p.w/p.h;
  if (Math.abs(r-1.5)<0.01)   return "3:2";
  if (Math.abs(r-0.8)<0.01)   return "4:5";
  if (Math.abs(r-0.5625)<0.01)return "9:16";
  if (Math.abs(r-1)<0.01)     return "1:1";
  return p.w+":"+p.h;
}
function selectPreset(id) {
  for (var i=0; i<PRESETS.length; i++) { if(PRESETS[i].id===id){ PRESET=PRESETS[i]; break; } }
  panX=0; panY=0;
  buildPresets();
  $("czone").style.aspectRatio = PRESET.w+"/"+PRESET.h;
  if (SRC_IMG) redraw();
}

// ── MODE ──────────────────────────────────────────────────────────────────
function initTabs() {
  $("tabR").addEventListener("click", function(){ setMode("rapido"); });
  $("tabD").addEventListener("click", function(){ setMode("diseno"); });
}
function setMode(m) {
  MODE = m;
  $("tabR").classList.toggle("active", m==="rapido");
  $("tabD").classList.toggle("active", m==="diseno");
  $("designExtras").classList.toggle("visible", m==="diseno");
  $("dragHint").classList.toggle("visible", SRC_IMG && m==="diseno");
  if (SRC_IMG) redraw();
}

// ── CAPTURE ───────────────────────────────────────────────────────────────
function initCapture() {
  $("btnCam").addEventListener("click", function(){ $("inputCam").click(); });
  $("btnGal").addEventListener("click", function(){ $("inputGal").click(); });
  $("inputCam").addEventListener("change", handleFile);
  $("inputGal").addEventListener("change", handleFile);
}
function handleFile(e) {
  var f = e.target.files[0];
  if (!f) return;
  e.target.value = "";
  var r = new FileReader();
  r.onload = function(ev) {
    var img = new Image();
    img.onload = function() {
      SRC_IMG = img;
      panX=0; panY=0;
      $("cph").style.display = "none";
      $("previewCanvas").classList.add("visible");
      $("czone").classList.add("has-img");
      $("btnSave").disabled = false;
      $("dragHint").classList.toggle("visible", MODE==="diseno");
      redraw();
      initPan();
    };
    img.src = ev.target.result;
  };
  r.readAsDataURL(f);
}

// ── PAN (drag to reframe) ─────────────────────────────────────────────────
function initPan() {
  var cv = $("previewCanvas");
  cv.onmousedown  = cv.ontouchstart  = panStart;
  cv.onmousemove  = cv.ontouchmove   = panMove;
  cv.onmouseup    = cv.ontouchend    = panEnd;
  cv.onmouseleave = panEnd;
}
function panStart(e) {
  if (MODE !== "diseno") return;
  e.preventDefault();
  panDrag = true;
  var pt = e.touches ? e.touches[0] : e;
  panLast = { x: pt.clientX, y: pt.clientY };
}
function panMove(e) {
  if (!panDrag || !panLast) return;
  e.preventDefault();
  var pt = e.touches ? e.touches[0] : e;
  var cv = $("previewCanvas");
  var zone = ZONES[PRESET.id];
  if (!zone || !SRC_IMG) return;

  // Scale: canvas logical size vs display size
  var scaleX = PRESET.w / cv.clientWidth;
  var scaleY = PRESET.h / cv.clientHeight;

  var dx = (pt.clientX - panLast.x) * scaleX;
  var dy = (pt.clientY - panLast.y) * scaleY;

  // Clamp pan so photo always fills the zone
  var zw = zone.w, zh = zone.h;
  var imgScale = Math.max(zw/SRC_IMG.naturalWidth, zh/SRC_IMG.naturalHeight);
  var scaledW = SRC_IMG.naturalWidth  * imgScale;
  var scaledH = SRC_IMG.naturalHeight * imgScale;
  var maxPanX = (scaledW - zw) / 2;
  var maxPanY = (scaledH - zh) / 2;

  panX = Math.max(-maxPanX, Math.min(maxPanX, panX + dx));
  panY = Math.max(-maxPanY, Math.min(maxPanY, panY + dy));
  panLast = { x: pt.clientX, y: pt.clientY };
  redraw();
}
function panEnd() { panDrag = false; panLast = null; }

// ── DRAW ──────────────────────────────────────────────────────────────────
function redraw() {
  if (!SRC_IMG || !PRESET) return;
  var cv  = $("previewCanvas");
  var ctx = cv.getContext("2d");
  var w = PRESET.w, h = PRESET.h;
  cv.width = w; cv.height = h;
  ctx.clearRect(0,0,w,h);

  var zone = ZONES[PRESET.id];

  if (MODE === "rapido" || !zone) {
    // Modo Rápido: fill canvas, cover
    drawImgCover(ctx, SRC_IMG, 0, 0, w, h, 0, 0);
  } else {
    // Modo Diseño: draw image only inside zone
    var zx = zone.x * (w/zone.cw);
    var zy = zone.y * (h/zone.ch);
    var zw = zone.w * (w/zone.cw);
    var zh = zone.h * (h/zone.ch);
    ctx.save();
    ctx.beginPath();
    roundRect(ctx, zx, zy, zw, zh, 47*(w/zone.cw));
    ctx.clip();
    drawImgCover(ctx, SRC_IMG, zx, zy, zw, zh, panX, panY);
    ctx.restore();
    // SVG overlay
    var svgSrc = SVGS[PRESET.id];
    if (svgSrc) {
      var simg = new Image();
      simg.onload = function() {
        ctx.drawImage(simg, 0, 0, w, h);
        drawOverlayText(ctx, w, h);
      };
      simg.onerror = function() { drawOverlayText(ctx, w, h); };
      simg.src = svgSrc;
    } else {
      drawOverlayText(ctx, w, h);
    }
  }
}

function drawImgCover(ctx, img, dx, dy, dw, dh, offsetX, offsetY) {
  var scale = Math.max(dw/img.naturalWidth, dh/img.naturalHeight);
  var sw = dw/scale, sh = dh/scale;
  var baseX = (img.naturalWidth  - sw)/2;
  var baseY = (img.naturalHeight - sh)/2;
  // Apply pan offset (in source pixels)
  var sx = baseX - offsetX/scale;
  var sy = baseY - offsetY/scale;
  ctx.drawImage(img, sx, sy, sw, sh, dx, dy, dw, dh);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y);
  ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r);
  ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h);
  ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r);
  ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function drawOverlayText(ctx, w, h) {
  var txt = $("overlayText").value.trim();
  if (!txt || !PRESET) return;
  var safe = SAFE[PRESET.id];
  if (!safe) return;
  var zone = ZONES[PRESET.id];
  var scX = w/zone.cw, scY = h/zone.ch;
  var sx = safe.x*scX, sy = safe.y*scY;
  var sw = safe.w*scX, sh = safe.h*scY;

  // Font size based on TEXT_SIZE level: XS=2.5% S=3.5% M=4.5% L=5.5% XL=6.5% of canvas h
  var pcts = [0.025, 0.035, 0.045, 0.055, 0.065];
  var fontSize = Math.round(h * pcts[TEXT_SIZE]);
  ctx.font = "700 "+fontSize+"px Montserrat,sans-serif";

  // Wrap text to fit safe width
  var lines = wrapText(ctx, txt, sw*0.95);
  // If too many lines, reduce size
  while (lines.length * fontSize * 1.3 > sh && fontSize > 16) {
    fontSize -= 2;
    ctx.font = "700 "+fontSize+"px Montserrat,sans-serif";
    lines = wrapText(ctx, txt, sw*0.95);
  }

  var lineH  = fontSize * 1.3;
  var totalH = lines.length * lineH;
  var startY = sy + (sh - totalH)/2 + lineH*0.8;

  ctx.fillStyle    = "#ffffff";
  ctx.textBaseline = "alphabetic";
  ctx.textAlign    = TEXT_ALIGN;

  var textX;
  if (TEXT_ALIGN === "left")   textX = sx + sw*0.02;
  if (TEXT_ALIGN === "center") textX = sx + sw/2;
  if (TEXT_ALIGN === "right")  textX = sx + sw*0.98;

  for (var i=0; i<lines.length; i++) {
    ctx.fillText(lines[i], textX, startY + i*lineH);
  }
}

function wrapText(ctx, text, maxW) {
  var words = text.split(" "), lines = [], line = "";
  for (var i=0; i<words.length; i++) {
    var test = line ? line+" "+words[i] : words[i];
    if (ctx.measureText(test).width > maxW && line) { lines.push(line); line=words[i]; }
    else line=test;
  }
  if (line) lines.push(line);
  return lines;
}

// ── TEXT CONTROLS ─────────────────────────────────────────────────────────
function initTextControls() {
  $("btnSizeUp").addEventListener("click", function() {
    if (TEXT_SIZE < 4) { TEXT_SIZE++; $("sizeVal").textContent=SIZE_LABELS[TEXT_SIZE]; if(SRC_IMG) redraw(); }
  });
  $("btnSizeDown").addEventListener("click", function() {
    if (TEXT_SIZE > 0) { TEXT_SIZE--; $("sizeVal").textContent=SIZE_LABELS[TEXT_SIZE]; if(SRC_IMG) redraw(); }
  });
  var aligns = ["aLeft","aCenter","aRight"];
  var vals   = ["left","center","right"];
  for (var i=0; i<aligns.length; i++) {
    (function(idx){
      $(aligns[idx]).addEventListener("click", function() {
        TEXT_ALIGN = vals[idx];
        for (var j=0; j<aligns.length; j++) $(aligns[j]).classList.remove("active");
        $(aligns[idx]).classList.add("active");
        if (SRC_IMG) redraw();
      });
    })(i);
  }
  $("overlayText").addEventListener("input", function() {
    var words = this.value.trim().split(/\s+/).filter(Boolean).length;
    var el = $("wcount");
    el.textContent = words + (words===1?" palabra":" palabras");
    el.classList.toggle("warn", words>15);
    if (SRC_IMG) redraw();
  });
}

// ── SAVE ──────────────────────────────────────────────────────────────────
function initSave() {
  $("btnSave").addEventListener("click", doSave);
}
function doSave() {
  if (!SRC_IMG || !PRESET) return;
  $("loading").classList.add("show");
  var w=PRESET.w, h=PRESET.h, pid=PRESET.id;
  var quality = MODE==="rapido" ? 0.82 : 0.85;
  var cv = document.createElement("canvas");
  cv.width=w; cv.height=h;
  var ctx = cv.getContext("2d");
  var zone = ZONES[pid];

  if (MODE==="rapido" || !zone) {
    drawImgCover(ctx, SRC_IMG, 0, 0, w, h, 0, 0);
    exportCv(cv, pid, quality);
  } else {
    var zx=zone.x*(w/zone.cw), zy=zone.y*(h/zone.ch);
    var zw=zone.w*(w/zone.cw), zh=zone.h*(h/zone.ch);
    ctx.save();
    ctx.beginPath();
    roundRect(ctx, zx, zy, zw, zh, 47*(w/zone.cw));
    ctx.clip();
    drawImgCover(ctx, SRC_IMG, zx, zy, zw, zh, panX, panY);
    ctx.restore();
    var svgImg = new Image();
    svgImg.onload = function() {
      ctx.drawImage(svgImg, 0, 0, w, h);
      drawOverlayText(ctx, w, h);
      exportCv(cv, pid, quality);
    };
    svgImg.onerror = function() { drawOverlayText(ctx, w, h); exportCv(cv, pid, quality); };
    svgImg.src = SVGS[pid];
  }
}
function exportCv(cv, pid, quality) {
  cv.toBlob(function(blob) {
    $("loading").classList.remove("show");
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href=url; a.download="megacam_"+pid+"_"+Date.now()+".jpg";
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast("Imagen lista");
  }, "image/jpeg", quality);
}
function showToast(msg) {
  var t=$("toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(function(){ t.classList.remove("show"); }, 2800);
}

// ── INIT ──────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", function() {
  PRESET = PRESETS[0];
  initAuth();
  buildPresets();
  $("czone").style.aspectRatio = PRESET.w+"/"+PRESET.h;
  initTabs();
  initCapture();
  initTextControls();
  initSave();
});
</script>

<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a234c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MegaCam">
<title>MegaCam — Meganoticias</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Montserrat:wght@700&display=swap" rel="stylesheet">
<style>
:root{--navy:#0a234c;--red:#E30613;--gold:#FFD100;--white:#fff;--g4:#9aa0ab;--g6:#5f6571;--ok:#22c55e;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:"Barlow Condensed",sans-serif;background:var(--navy);color:var(--white);min-height:100dvh;overflow-x:hidden;}
#gate{position:fixed;inset:0;z-index:1000;background:var(--navy);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;transition:opacity .4s;}
#gate.hidden{opacity:0;pointer-events:none;}
.g-logo{width:68px;height:68px;background:var(--red);border-radius:14px;display:flex;align-items:center;justify-content:center;margin-bottom:1.25rem;box-shadow:0 8px 28px rgba(227,6,19,.4);}
.g-title{font-size:2.1rem;font-weight:800;letter-spacing:.05em;margin-bottom:.2rem;}
.g-sub{font-size:.8rem;color:var(--g4);margin-bottom:2rem;text-transform:uppercase;letter-spacing:.1em;}
.g-err{background:rgba(227,6,19,.15);border:1px solid rgba(227,6,19,.4);border-radius:9px;padding:.65rem 1rem;font-size:.82rem;color:#ff6b6b;margin-bottom:.75rem;display:none;}
.g-err.show{display:block;}
.g-wrap{width:100%;max-width:260px;}
.g-input{width:100%;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.15);border-radius:10px;padding:.8rem 1rem;color:#fff;font-family:"Barlow Condensed",sans-serif;font-size:1.5rem;font-weight:700;letter-spacing:.3em;text-align:center;outline:none;margin-bottom:.65rem;display:block;}
.g-btn{width:100%;padding:.8rem;background:var(--red);border:none;border-radius:10px;color:#fff;font-family:"Barlow Condensed",sans-serif;font-size:1rem;font-weight:800;letter-spacing:.08em;cursor:pointer;}
#app{display:none;flex-direction:column;min-height:100dvh;}
#app.visible{display:flex;}
.hdr{background:var(--navy);padding:.7rem 1rem;display:flex;align-items:center;gap:.5rem;border-bottom:2px solid rgba(255,209,0,.2);position:sticky;top:0;z-index:100;}
.hdr-mk{width:28px;height:28px;background:var(--red);border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hdr-t{font-size:1.2rem;font-weight:800;letter-spacing:.04em;}
.hdr-t span{color:var(--gold);}
.tabs{display:grid;grid-template-columns:1fr 1fr;background:rgba(255,255,255,.05);margin:.65rem 1rem;border-radius:11px;padding:3px;gap:3px;}
.tab{padding:.55rem;border:none;border-radius:8px;font-family:"Barlow Condensed",sans-serif;font-size:.9rem;font-weight:700;letter-spacing:.03em;cursor:pointer;color:var(--g4);background:transparent;transition:all .2s;}
.tab.active{background:var(--red);color:#fff;box-shadow:0 2px 10px rgba(227,6,19,.35);}
.content{flex:1;padding:0 1rem 2rem;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.slabel{font-size:.65rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:.45rem;margin-top:.9rem;display:block;}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;}
.pbtn{background:rgba(255,255,255,.06);border:1.5px solid rgba(255,255,255,.1);border-radius:10px;padding:.6rem .45rem;cursor:pointer;color:#fff;display:flex;align-items:center;gap:.45rem;transition:all .18s;}
.pbtn.active{background:rgba(255,209,0,.12);border-color:var(--gold);}
.pthumb{flex-shrink:0;border-radius:4px;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;font-size:.48rem;color:var(--g4);font-weight:700;}
.pname{font-size:.82rem;font-weight:700;line-height:1.1;}
.pdims{font-size:.62rem;color:var(--g4);margin-top:.1rem;}
.canvas-wrap{margin:0 4px;border-radius:12px;overflow:hidden;position:relative;background:#000;border:2px dashed rgba(255,255,255,.15);}
.canvas-wrap.has-img{border-style:solid;border-color:rgba(255,209,0,.3);}
.cph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:.4rem;pointer-events:none;}
.cph.hidden{display:none;}
.cph-icon{font-size:2rem;}
.cph-lbl{font-size:.9rem;font-weight:700;}
.cph-sub{font-size:.68rem;color:var(--g4);}
#cv{width:100%;display:block;touch-action:none;}
.drag-hint{font-size:.68rem;color:var(--g4);text-align:center;margin-top:.35rem;display:none;}
.drag-hint.show{display:block;}
.cbtns{display:grid;grid-template-columns:1fr 1fr;gap:.45rem;margin-top:.45rem;}
.cbtn{padding:.65rem;border:none;border-radius:9px;font-family:"Barlow Condensed",sans-serif;font-size:.88rem;font-weight:700;letter-spacing:.03em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.3rem;}
.cbtn-c{background:var(--red);color:#fff;}
.cbtn-g{background:rgba(255,255,255,.1);color:#fff;}
#dex{display:none;}
#dex.show{display:block;}
.txc{display:flex;align-items:center;gap:.4rem;margin-bottom:.4rem;flex-wrap:wrap;}
.abtns{display:flex;gap:.25rem;}
.abtn{width:32px;height:32px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:7px;color:#fff;font-size:.8rem;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.abtn.active{background:rgba(255,209,0,.15);border-color:var(--gold);color:var(--gold);}
.szc{display:flex;align-items:center;gap:.25rem;margin-left:auto;}
.szbtn{width:32px;height:32px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:7px;color:#fff;font-size:.9rem;cursor:pointer;display:flex;align-items:center;justify-content:center;font-weight:700;}
.szval{font-size:.82rem;font-weight:700;color:var(--g4);min-width:28px;text-align:center;}
#otxt{width:100%;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.12);border-radius:9px;padding:.7rem .9rem;color:#fff;font-family:"Barlow Condensed",sans-serif;font-size:.9rem;font-weight:600;resize:none;outline:none;transition:border-color .2s;line-height:1.4;}
#otxt:focus{border-color:var(--gold);}
#otxt::placeholder{color:var(--g6);}
.wc{font-size:.65rem;color:var(--g4);text-align:right;margin-top:.2rem;}
.wc.warn{color:var(--red);}
.bsave{width:100%;margin-top:.9rem;padding:.85rem;background:var(--red);color:#fff;border:none;border-radius:11px;font-family:"Barlow Condensed",sans-serif;font-size:1.05rem;font-weight:800;letter-spacing:.05em;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:.4rem;box-shadow:0 4px 18px rgba(227,6,19,.3);}
.bsave:disabled{background:var(--g6);box-shadow:none;cursor:default;}
#toast{position:fixed;bottom:1.5rem;left:50%;transform:translateX(-50%) translateY(16px);background:var(--ok);color:#fff;padding:.6rem 1.2rem;border-radius:50px;font-size:.88rem;font-weight:700;pointer-events:none;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#ld{display:none;position:fixed;inset:0;z-index:500;background:rgba(10,35,76,.85);align-items:center;justify-content:center;flex-direction:column;gap:.8rem;}
#ld.show{display:flex;}
.spin{width:38px;height:38px;border:3px solid rgba(255,255,255,.1);border-top-color:var(--gold);border-radius:50%;animation:sp .7s linear infinite;}
@keyframes sp{to{transform:rotate(360deg);}}
.spin-t{font-size:.82rem;font-weight:600;color:var(--g4);letter-spacing:.08em;text-transform:uppercase;}
input[type=file]{display:none;}
.toggles-row{display:flex;flex-direction:column;gap:.4rem;margin-top:.5rem;}
.toggle-item{display:flex;align-items:center;justify-content:space-between;background:rgba(255,255,255,.05);border-radius:10px;padding:.6rem .9rem;cursor:pointer;}
.toggle-label{font-size:.82rem;font-weight:700;display:flex;align-items:center;gap:.5rem;color:var(--white);}
.tpill{width:40px;height:22px;background:rgba(255,255,255,.15);border-radius:11px;position:relative;transition:background .2s;flex-shrink:0;}
.tpill.on{background:var(--gold);}
.tpill::after{content:"";position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:3px;left:3px;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.3);}
.tpill.on::after{transform:translateX(18px);}
#rapidoExtras{display:block;}
</style>

<body>
<div id="gate">
  <div class="g-logo">
    <svg viewBox="0 0 44 44" fill="none" width="42" height="42">
      <rect x="4" y="4" width="16" height="16" rx="3" fill="white"/>
      <rect x="24" y="4" width="16" height="16" rx="3" fill="white" opacity=".6"/>
      <rect x="4" y="24" width="16" height="16" rx="3" fill="white" opacity=".6"/>
      <rect x="24" y="24" width="16" height="16" rx="3" fill="white" opacity=".3"/>
    </svg>
  </div>
  <div class="g-title">MEGA<span style="color:var(--gold)">CAM</span></div>
  <div class="g-sub">Meganoticias &middot; Uso interno</div>
  <div class="g-err" id="gErr">PIN incorrecto</div>
  <div class="g-wrap">
    <input id="pin" class="g-input" type="password" inputmode="numeric" maxlength="6" placeholder="&#8226;&#8226;&#8226;&#8226;&#8226;&#8226;">
    <button class="g-btn" id="btnPin">INGRESAR</button>
  </div>
</div>
<div id="ld"><div class="spin"></div><div class="spin-t">Procesando...</div></div>
<div id="app">
  <div class="hdr">
    <div class="hdr-mk">
      <svg viewBox="0 0 20 20" fill="none" width="17" height="17">
        <rect x="2" y="2" width="7" height="7" rx="1.5" fill="white"/>
        <rect x="11" y="2" width="7" height="7" rx="1.5" fill="white" opacity=".6"/>
        <rect x="2" y="11" width="7" height="7" rx="1.5" fill="white" opacity=".6"/>
        <rect x="11" y="11" width="7" height="7" rx="1.5" fill="white" opacity=".3"/>
      </svg>
    </div>
    <div class="hdr-t">MEGA<span>CAM</span></div>
  </div>
  <div class="tabs">
    <button class="tab active" id="tabR">&#9889; MODO RAPIDO</button>
    <button class="tab" id="tabD">&#127912; MODO DISENO</button>
  </div>
  <div class="content">
    <span class="slabel">Formato</span>
    <div class="pgrid" id="pgrid"></div>
    <span class="slabel">Foto</span>
    <div class="canvas-wrap" id="cwrap">
      <div class="cph" id="cph">
        <span class="cph-icon">&#128247;</span>
        <div class="cph-lbl">Toca para agregar foto</div>
        <div class="cph-sub">Camara o galeria</div>
      </div>
      <canvas id="cv"></canvas>
    </div>
    <div class="drag-hint" id="dHint">&#9757; Arrastra o pellizca para reencuadrar</div>
    <div class="cbtns">
      <button class="cbtn cbtn-c" id="btnCam">&#128247; Camara</button>
      <button class="cbtn cbtn-g" id="btnGal">&#128444; Galeria</button>
    </div>
    <div id="rapidoExtras">
      <span class="slabel">Opciones</span>
      <div class="toggles-row">
        <div class="toggle-item" id="toggleLogoItem">
          <div class="toggle-label">&#128247; Logo en esquina</div>
          <div class="tpill" id="pillLogo"></div>
        </div>
        <div class="toggle-item" id="toggleWmItem">
          <div class="toggle-label">&#128274; Marca de agua</div>
          <div class="tpill" id="pillWm"></div>
        </div>
      </div>
    </div>

    <div id="dex">
      <span class="slabel">Texto (12-15 palabras)</span>
      <div class="txc">
        <div class="abtns">
          <button class="abtn active" id="aL">&#8676;</button>
          <button class="abtn" id="aC">&#8644;</button>
          <button class="abtn" id="aR">&#8677;</button>
        </div>
        <div class="szc">
          <button class="szbtn" id="szD">&#9660;</button>
          <span class="szval" id="szV">M</span>
          <button class="szbtn" id="szU">&#9650;</button>
        </div>
      </div>
      <textarea id="otxt" rows="3" placeholder="Escribe el titular..."></textarea>
      <div class="wc" id="wc">0 palabras</div>
    </div>
    <button class="bsave" id="btnSave" disabled>&#128190; GUARDAR EN GALERIA</button>
  </div>
</div>
<div id="toast">Imagen lista</div>
<input type="file" id="iCam" accept="image/*" capture="environment">
<input type="file" id="iGal" accept="image/*">

function preloadSVGs(){
  // Preload logo

  var keys=["fbig","story","twitter"];
  for(var i=0;i<keys.length;i++){

function $(id){return document.getElementById(id);}

function initAuth(){
  if(localStorage.getItem("mc_auth")==="ok"){unlock();return;}
  $("btnPin").addEventListener("click",doPin);
  $("pin").addEventListener("keydown",function(e){if(e.key==="Enter")doPin();});
}
function doPin(){
  if($("pin").value.trim()===PIN){localStorage.setItem("mc_auth","ok");unlock();}
  else{$("gErr").classList.add("show");$("pin").value="";}
}
function unlock(){
  var g=$("gate"),a=$("app");
  if(g)g.classList.add("hidden");
  if(a)a.classList.add("visible");
  setTimeout(function(){if(g&&g.parentNode)g.parentNode.removeChild(g);},500);
  autoCamera();
}

function buildPresets(){
  var grid=$("pgrid"),html="";
  for(var i=0;i<PRESETS.length;i++){
    var p=PRESETS[i];
    var r=p.w/p.h;
    var tw=r>=1?36:Math.round(36*r);
    var th=r<1?36:Math.round(36/r);
    var act=(PRESET&&PRESET.id===p.id)?" active":"";
    html+="<button class='pbtn"+act+"' data-id='"+p.id+"'>"
         +"<div class='pthumb' style='width:"+tw+"px;height:"+th+"px'>"+rl(p)+"</div>"
         +"<div><div class='pname'>"+p.name+"</div><div class='pdims'>"+p.dims+"</div></div>"
         +"</button>";
  }
  grid.innerHTML=html;
  var bs=grid.querySelectorAll(".pbtn");
  for(var j=0;j<bs.length;j++){
    bs[j].addEventListener("click",function(){selPreset(this.getAttribute("data-id"));});
  }
}
function rl(p){
  var r=p.w/p.h;
  if(Math.abs(r-1.5)<.01)return"3:2";
  if(Math.abs(r-0.8)<.01)return"4:5";
  if(Math.abs(r-0.5625)<.01)return"9:16";
  if(Math.abs(r-1)<.01)return"1:1";
  return"";
}
function selPreset(id){
  for(var i=0;i<PRESETS.length;i++){if(PRESETS[i].id===id){PRESET=PRESETS[i];break;}}
  ZOOM=1;PANX=0;PANY=0;
  buildPresets();
  updateAspect();
  if(SRC)draw();
}
function updateAspect(){
  $("cwrap").style.aspectRatio=PRESET.w+"/"+PRESET.h;
}

function initTabs(){
  $("tabR").addEventListener("click",function(){setMode("rapido");});
  $("tabD").addEventListener("click",function(){setMode("diseno");});
}
function setMode(m){
  MODE=m;
  $("tabR").classList.toggle("active",m==="rapido");
  $("tabD").classList.toggle("active",m==="diseno");
  $("dex").classList.toggle("show",m==="diseno");
  $("rapidoExtras").style.display=m==="rapido"?"block":"none";
  $("dHint").classList.toggle("show",SRC&&m==="diseno");
  if(SRC)draw();
}

function initCapture(){
  $("btnCam").addEventListener("click",function(){$("iCam").click();});
  $("btnGal").addEventListener("click",function(){$("iGal").click();});
  $("iCam").addEventListener("change",loadFile);
  $("iGal").addEventListener("change",loadFile);
}
function loadFile(e){
  var f=e.target.files[0];if(!f)return;
  e.target.value="";
  var r=new FileReader();
  r.onload=function(ev){
    var img=new Image();
    img.onload=function(){
      SRC=img;ZOOM=1;PANX=0;PANY=0;
      $("cph").classList.add("hidden");
      $("cwrap").classList.add("has-img");
      $("btnSave").disabled=false;
      $("dHint").classList.toggle("show",MODE==="diseno");
      draw();
    };
    img.src=ev.target.result;
  };
  r.readAsDataURL(f);
}

function initGestures(){
  var cv=$("cv");
  cv.addEventListener("touchstart", onTS,{passive:false});
  cv.addEventListener("touchmove",  onTM,{passive:false});
  cv.addEventListener("touchend",   onTE);
  cv.addEventListener("touchcancel",onTE);
  cv.addEventListener("mousedown",  onMS);
  cv.addEventListener("mousemove",  onMM);
  cv.addEventListener("mouseup",    onME);
  cv.addEventListener("mouseleave", onME);
}
function onTS(e){
  if(MODE!=="diseno"||!SRC)return;
  e.preventDefault();
  if(e.touches.length===1){
    G.active=true;G.type="pan";
    G.lx=e.touches[0].clientX;G.ly=e.touches[0].clientY;
  }else if(e.touches.length===2){
    G.active=true;G.type="pinch";
    G.pd=pdist(e.touches);G.pz=ZOOM;
    G.lx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    G.ly=(e.touches[0].clientY+e.touches[1].clientY)/2;
  }
}
function onTM(e){
  if(!G.active||MODE!=="diseno"||!SRC)return;
  e.preventDefault();
  if(G.type==="pan"&&e.touches.length===1){
    applyPan(e.touches[0].clientX-G.lx,e.touches[0].clientY-G.ly);
    G.lx=e.touches[0].clientX;G.ly=e.touches[0].clientY;
  }else if(G.type==="pinch"&&e.touches.length===2){
    var nd=pdist(e.touches);
    var zone=ZONES[PRESET.id];
    var zw=zone?zone.w:PRESET.w,zh=zone?zone.h:PRESET.h;
    var minZ=Math.max(zw/SRC.naturalWidth,zh/SRC.naturalHeight);
    ZOOM=Math.max(minZ,Math.min(G.pz*(nd/G.pd),minZ*6));
    clampPan();draw();
    var cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    var cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
    applyPan(cx-G.lx,cy-G.ly);
    G.lx=cx;G.ly=cy;
  }
}
function onTE(){G.active=false;G.type=null;}
function onMS(e){if(MODE!=="diseno"||!SRC)return;G.active=true;G.type="pan";G.lx=e.clientX;G.ly=e.clientY;}
function onMM(e){if(!G.active||G.type!=="pan"||!SRC)return;applyPan(e.clientX-G.lx,e.clientY-G.ly);G.lx=e.clientX;G.ly=e.clientY;}
function onME(){G.active=false;}
function pdist(t){var dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;return Math.sqrt(dx*dx+dy*dy);}

function applyPan(sdx,sdy){
  if(!SRC||!PRESET)return;
  var cv=$("cv");
  var zone=ZONES[PRESET.id];
  var zw=zone?zone.w*(PRESET.w/zone.cw):PRESET.w;
  var zh=zone?zone.h*(PRESET.h/zone.ch):PRESET.h;
  var dispW=cv.clientWidth||1;
  var pxPerScreen=PRESET.w/dispW;
  PANX+=(-sdx*pxPerScreen)*(1/ZOOM);
  PANY+=(-sdy*pxPerScreen*(PRESET.h/PRESET.w))*(1/ZOOM);
  clampPan();
  draw();
}
function clampPan(){
  if(!SRC||!PRESET)return;
  var zone=ZONES[PRESET.id];
  var zw=zone?zone.w:PRESET.w,zh=zone?zone.h:PRESET.h;
  var baseScale=Math.max(zw/SRC.naturalWidth,zh/SRC.naturalHeight);
  var scale=baseScale*ZOOM;
  var visW=zw/scale,visH=zh/scale;
  var maxX=(SRC.naturalWidth-visW)/2;
  var maxY=(SRC.naturalHeight-visH)/2;
  if(maxX<0)maxX=0;if(maxY<0)maxY=0;
  if(PANX>maxX)PANX=maxX;if(PANX<-maxX)PANX=-maxX;
  if(PANY>maxY)PANY=maxY;if(PANY<-maxY)PANY=-maxY;
}

function draw(){
  if(!SRC||!PRESET)return;
  var cv=$("cv"),ctx=cv.getContext("2d");
  var W=PRESET.w,H=PRESET.h;
  cv.width=W;cv.height=H;
  ctx.clearRect(0,0,W,H);
  var zone=ZONES[PRESET.id];
  if(MODE==="rapido"||!zone){
    blit(ctx,SRC,0,0,W,H,0,0,1);
  }else{
    var sx=W/zone.cw,sy=H/zone.ch;
    var zx=zone.x*sx,zy=zone.y*sy,zw=zone.w*sx,zh=zone.h*sy;
    var si=SVG_IMGS[PRESET.id];
    // Layer 1: SVG background
    if(si&&si.complete&&si.naturalWidth)ctx.drawImage(si,0,0,W,H);
    // Layer 2: photo clipped to holder
    ctx.save();
    ctx.beginPath();
    rrect(ctx,zx,zy,zw,zh,47*sx);
    ctx.clip();
    blit(ctx,SRC,zx,zy,zw,zh,PANX,PANY,ZOOM);
    ctx.restore();
    // Layer 3: SVG on top (seals the frame border)
    if(si&&si.complete&&si.naturalWidth)ctx.drawImage(si,0,0,W,H);
    // Layer 4: text
    drawTxt(ctx,W,H,sx,sy);
  }

  // Logo corner (both modes)
  if(USE_LOGO && LOGO_IMG && LOGO_IMG.complete && LOGO_IMG.naturalWidth){
    drawLogo(ctx,W,H);
  }
  // Watermark (both modes)
  if(USE_WM && LOGO_IMG && LOGO_IMG.complete && LOGO_IMG.naturalWidth){
    drawWatermark(ctx,W,H);
  }
}

function drawLogo(ctx,W,H){
  var size = Math.round(W*0.10);
  var pad  = Math.round(W*0.025);
  ctx.drawImage(LOGO_IMG, pad, pad, size, Math.round(size*(LOGO_IMG.naturalHeight/LOGO_IMG.naturalWidth)));
}

function drawWatermark(ctx,W,H){
  var tileW = Math.round(W*0.28);
  var tileH = Math.round(tileW*(LOGO_IMG.naturalHeight/LOGO_IMG.naturalWidth));
  var gap   = Math.round(tileW*0.55);

  ctx.save();
  ctx.globalAlpha = 0.15;

  // Rotate 45 degrees around center
  ctx.translate(W/2, H/2);
  ctx.rotate(-Math.PI/5);
  ctx.translate(-W/2, -H/2);

  // Fill diagonal pattern
  var cols = Math.ceil(W/(tileW+gap))+3;
  var rows = Math.ceil(H/(tileH+gap))+3;
  var startX = -tileW*2;
  var startY = -tileH*2;

  for(var r=0;r<rows;r++){
    for(var c=0;c<cols;c++){
      ctx.drawImage(LOGO_IMG,
        startX + c*(tileW+gap),
        startY + r*(tileH+gap),
        tileW, tileH);
    }
  }
  ctx.restore();
}
function blit(ctx,img,dx,dy,dw,dh,px,py,zoom){
  var baseS=Math.max(dw/img.naturalWidth,dh/img.naturalHeight);
  var scale=baseS*zoom;
  var sw=dw/scale,sh=dh/scale;
  var sx=(img.naturalWidth-sw)/2+px;
  var sy=(img.naturalHeight-sh)/2+py;
  if(sx<0)sx=0;if(sy<0)sy=0;
  if(sx+sw>img.naturalWidth)sx=img.naturalWidth-sw;
  if(sy+sh>img.naturalHeight)sy=img.naturalHeight-sh;
  ctx.drawImage(img,sx,sy,sw,sh,dx,dy,dw,dh);
}
function rrect(ctx,x,y,w,h,r){
  if(r>w/2)r=w/2;if(r>h/2)r=h/2;
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}
function drawTxt(ctx,W,H,sx,sy){
  var txt=$("otxt").value.trim();if(!txt)return;
  var safe=SAFE[PRESET.id];if(!safe)return;
  var tx=safe.x*sx,ty=safe.y*sy,tw=safe.w*sx,th=safe.h*sy;
  var pcts=[0.025,0.035,0.045,0.055,0.065];
  var fs=Math.round(H*pcts[TSIZ]);
  ctx.font="700 "+fs+"px Montserrat,sans-serif";
  var lines=wrap(ctx,txt,tw*0.95);
  while(lines.length*fs*1.3>th&&fs>14){fs-=2;ctx.font="700 "+fs+"px Montserrat,sans-serif";lines=wrap(ctx,txt,tw*0.95);}
  var lh=fs*1.3,totH=lines.length*lh;
  var startY=ty+(th-totH)/2+lh*0.78;
  ctx.fillStyle="#fff";ctx.textBaseline="alphabetic";ctx.textAlign=TALIGN;
  var textX=TALIGN==="left"?tx+tw*0.02:TALIGN==="center"?tx+tw/2:tx+tw*0.98;
  for(var i=0;i<lines.length;i++)ctx.fillText(lines[i],textX,startY+i*lh);
}
function wrap(ctx,text,maxW){
  var words=text.split(" "),lines=[],line="";
  for(var i=0;i<words.length;i++){
    var test=line?line+" "+words[i]:words[i];
    if(ctx.measureText(test).width>maxW&&line){lines.push(line);line=words[i];}else line=test;
  }
  if(line)lines.push(line);return lines;
}

function initTextCtrl(){
  $("szU").addEventListener("click",function(){if(TSIZ<4){TSIZ++;$("szV").textContent=SZLBL[TSIZ];if(SRC)draw();}});
  $("szD").addEventListener("click",function(){if(TSIZ>0){TSIZ--;$("szV").textContent=SZLBL[TSIZ];if(SRC)draw();}});
  var aids=["aL","aC","aR"],avals=["left","center","right"];
  for(var i=0;i<aids.length;i++){
    (function(idx){$(aids[idx]).addEventListener("click",function(){
      TALIGN=avals[idx];
      for(var j=0;j<aids.length;j++)$(aids[j]).classList.remove("active");
      $(aids[idx]).classList.add("active");
      if(SRC)draw();
    });})(i);
  }
  $("otxt").addEventListener("input",function(){
    var w=this.value.trim().split(" ").filter(function(x){return x.length>0;}).length;
    var el=$("wc");
    el.textContent=w+(w===1?" palabra":" palabras");
    el.classList.toggle("warn",w>15);
    if(SRC)draw();
  });
}

function initSave(){$("btnSave").addEventListener("click",doSave);}

function initToggles(){
  $("toggleLogoItem").addEventListener("click",function(){
    USE_LOGO=!USE_LOGO;
    $("pillLogo").classList.toggle("on",USE_LOGO);
    if(SRC) draw();
  });
  $("toggleWmItem").addEventListener("click",function(){
    USE_WM=!USE_WM;
    $("pillWm").classList.toggle("on",USE_WM);
    if(SRC) draw();
  });
}
function doSave(){
  if(!SRC||!PRESET)return;
  $("ld").classList.add("show");
  setTimeout(function(){
    var W=PRESET.w,H=PRESET.h,pid=PRESET.id;
    var q=MODE==="rapido"?0.82:0.85;
    var cv2=document.createElement("canvas");
    cv2.width=W;cv2.height=H;
    var ctx=cv2.getContext("2d");
    var zone=ZONES[pid];
    if(MODE==="rapido"||!zone){
      blit(ctx,SRC,0,0,W,H,0,0,1);
    }else{
      var sx=W/zone.cw,sy=H/zone.ch;
      var zx=zone.x*sx,zy=zone.y*sy,zw=zone.w*sx,zh=zone.h*sy;
      var si=SVG_IMGS[pid];
      if(si&&si.complete&&si.naturalWidth)ctx.drawImage(si,0,0,W,H);
      ctx.save();ctx.beginPath();rrect(ctx,zx,zy,zw,zh,47*sx);ctx.clip();
      blit(ctx,SRC,zx,zy,zw,zh,PANX,PANY,ZOOM);ctx.restore();
      if(si&&si.complete&&si.naturalWidth)ctx.drawImage(si,0,0,W,H);
      drawTxt(ctx,W,H,sx,sy);
    }
    // Logo and watermark on top for both modes
    if(USE_LOGO && LOGO_IMG && LOGO_IMG.complete && LOGO_IMG.naturalWidth) drawLogo(ctx,W,H);
    if(USE_WM   && LOGO_IMG && LOGO_IMG.complete && LOGO_IMG.naturalWidth) drawWatermark(ctx,W,H);
    exportIt(cv2,pid,q);
  },50);
}
function exportIt(cv,pid,q){
  cv.toBlob(function(blob){
    $("ld").classList.remove("show");
    var url=URL.createObjectURL(blob);
    var a=document.createElement("a");
    a.href=url;a.download="megacam_"+pid+"_"+Date.now()+".jpg";
    document.body.appendChild(a);a.click();document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast("Imagen lista");
  },"image/jpeg",q);
}
function showToast(msg){
  var t=$("toast");t.textContent=msg;t.classList.add("show");
  setTimeout(function(){t.classList.remove("show");},2800);
}

document.addEventListener("DOMContentLoaded",function(){
  PRESET=PRESETS[0];
  preloadSVGs();
  initAuth();
  buildPresets();
  updateAspect();
  initTabs();
  initCapture();
  initGestures();
  initTextCtrl();
  initSave();
  initToggles();
});

// Auto-open camera on mobile when app unlocks (called from unlock())
function autoCamera(){
  var isMobile = /Android|iPhone|iPad/i.test(navigator.userAgent);
  if(isMobile && !SRC && MODE==="rapido"){
    setTimeout(function(){ $("iCam").click(); }, 600);
  }
}

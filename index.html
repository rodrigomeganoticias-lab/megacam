<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a234c">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MegaCam">
<title>MegaCam — Meganoticias</title>
<link rel="manifest" id="pwa-manifest">
<link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA1MTIgNTEyIj4KICA8cmVjdCB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiIgcng9IjEwMCIgZmlsbD0iI0UzMDYxMyIvPgogIDxyZWN0IHg9IjYwIiB5PSI2MCIgd2lkdGg9IjM5MiIgaGVpZ2h0PSIzOTIiIHJ4PSI3MCIgZmlsbD0ibm9uZSIgc3Ryb2tlPSJ3aGl0ZSIgc3Ryb2tlLXdpZHRoPSIyNCIvPgogIDx0ZXh0IHg9IjI1NiIgeT0iMzMwIiBmb250LWZhbWlseT0iQXJpYWwgQmxhY2ssc2Fucy1zZXJpZiIgZm9udC1zaXplPSIyMDAiIGZvbnQtd2VpZ2h0PSI5MDAiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZpbGw9IndoaXRlIj5NTjwvdGV4dD4KPC9zdmc+">
<meta name="apple-mobile-web-app-title" content="MegaCam">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0a234c;
    --navy-light: #0d2d63;
    --red: #E30613;
    --red-dark: #c0392b;
    --gold: #FFD100;
    --gold-dark: #d4a800;
    --white: #ffffff;
    --gray-100: #f4f5f7;
    --gray-200: #e8eaed;
    --gray-400: #9aa0ab;
    --gray-600: #5f6571;
    --success: #22c55e;
    --font-display: 'Barlow Condensed', sans-serif;
    --font-body: 'Barlow', sans-serif;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: var(--font-body);
    background: var(--navy);
    color: var(--white);
    min-height: 100dvh;
    overflow-x: hidden;
    user-select: none;
  }

  /* ── ACCESS GATE ─────────────────────────────── */
  #gate {
    position: fixed; inset: 0; z-index: 1000;
    background: var(--navy);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem;
    transition: opacity 0.4s ease;
  }
  #gate.hidden { opacity: 0; pointer-events: none; }

  .gate-logo {
    width: 72px; height: 72px;
    background: var(--red);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 1.5rem;
    box-shadow: 0 8px 32px rgba(227,6,19,0.4);
  }
  .gate-logo svg { width: 44px; height: 44px; }
  .gate-title {
    font-family: var(--font-display);
    font-size: 2.2rem; font-weight: 800;
    letter-spacing: 0.05em;
    margin-bottom: 0.25rem;
  }
  .gate-sub {
    font-size: 0.85rem; color: var(--gray-400);
    margin-bottom: 2.5rem; text-transform: uppercase; letter-spacing: 0.1em;
  }
  .gate-error {
    background: rgba(227,6,19,0.15);
    border: 1px solid rgba(227,6,19,0.4);
    border-radius: 10px;
    padding: 0.75rem 1.25rem;
    font-size: 0.85rem; color: #ff6b6b;
    margin-bottom: 1.5rem;
    display: none;
  }
  .gate-error.show { display: block; }

  /* ── APP SHELL ───────────────────────────────── */
  #app {
    display: none;
    flex-direction: column;
    min-height: 100dvh;
    padding-top: var(--safe-top);
    padding-bottom: var(--safe-bottom);
  }
  #app.visible { display: flex; }

  /* ── HEADER ──────────────────────────────────── */
  .app-header {
    background: var(--navy);
    padding: 1rem 1.25rem 0.75rem;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 2px solid rgba(255,209,0,0.2);
    position: sticky; top: 0; z-index: 100;
  }
  .header-logo {
    display: flex; align-items: center; gap: 0.6rem;
  }
  .header-logo-mark {
    width: 32px; height: 32px;
    background: var(--red);
    border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
  }
  .header-logo-mark svg { width: 20px; height: 20px; }
  .header-title {
    font-family: var(--font-display);
    font-size: 1.3rem; font-weight: 800;
    letter-spacing: 0.04em;
  }
  .header-title span { color: var(--gold); }

  /* ── MODE TABS ───────────────────────────────── */
  .mode-tabs {
    display: grid; grid-template-columns: 1fr 1fr;
    background: rgba(255,255,255,0.05);
    margin: 1rem 1.25rem;
    border-radius: 12px;
    padding: 4px;
    gap: 4px;
  }
  .mode-tab {
    padding: 0.65rem 1rem;
    border: none; border-radius: 9px;
    font-family: var(--font-display);
    font-size: 1rem; font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.2s ease;
    color: var(--gray-400);
    background: transparent;
  }
  .mode-tab.active {
    background: var(--red);
    color: var(--white);
    box-shadow: 0 2px 12px rgba(227,6,19,0.35);
  }
  .mode-tab .tab-icon { font-size: 1rem; margin-right: 0.4rem; }

  /* ── MAIN CONTENT ────────────────────────────── */
  .app-content {
    flex: 1;
    padding: 0 1.25rem 1.5rem;
    overflow-y: auto;
  }

  /* ── SECTION LABEL ───────────────────────────── */
  .section-label {
    font-family: var(--font-display);
    font-size: 0.7rem; font-weight: 700;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 0.6rem;
    margin-top: 1.25rem;
  }

  /* ── PRESET GRID ─────────────────────────────── */
  .preset-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    margin-bottom: 0.25rem;
  }
  .preset-btn {
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 11px;
    padding: 0.75rem 0.6rem;
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: left;
    color: var(--white);
    display: flex; align-items: center; gap: 0.6rem;
  }
  .preset-btn:active { transform: scale(0.97); }
  .preset-btn.active {
    background: rgba(255,209,0,0.12);
    border-color: var(--gold);
  }
  .preset-thumb {
    flex-shrink: 0;
    border-radius: 5px;
    background: rgba(255,255,255,0.1);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.55rem; color: var(--gray-400);
    font-family: var(--font-display); font-weight: 600;
  }
  .preset-info { flex: 1; min-width: 0; }
  .preset-name {
    font-family: var(--font-display);
    font-size: 0.9rem; font-weight: 700;
    line-height: 1.1;
  }
  .preset-dims {
    font-size: 0.7rem; color: var(--gray-400);
    margin-top: 0.15rem;
  }

  /* ── CAPTURE ZONE ────────────────────────────── */
  .capture-zone {
    background: rgba(255,255,255,0.04);
    border: 2px dashed rgba(255,255,255,0.15);
    border-radius: 14px;
    overflow: hidden;
    position: relative;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: border-color 0.2s;
  }
  .capture-zone:active { border-color: var(--gold); }
  .capture-zone.has-image { border-style: solid; border-color: rgba(255,209,0,0.3); }

  .capture-placeholder {
    padding: 2.5rem 1.5rem;
    text-align: center;
    pointer-events: none;
  }
  .capture-placeholder .icon {
    font-size: 2.5rem; margin-bottom: 0.75rem; display: block;
  }
  .capture-placeholder .label {
    font-family: var(--font-display);
    font-size: 1rem; font-weight: 700;
    margin-bottom: 0.3rem;
  }
  .capture-placeholder .sub {
    font-size: 0.78rem; color: var(--gray-400);
  }

  #previewCanvas {
    width: 100%; height: 100%;
    object-fit: contain;
    display: none;
  }
  #previewCanvas.visible { display: block; }

  /* ── CAPTURE BUTTONS ─────────────────────────── */
  .capture-actions {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    margin-top: 0.6rem;
  }
  .btn-capture {
    padding: 0.75rem;
    border: none; border-radius: 10px;
    font-family: var(--font-display);
    font-size: 0.95rem; font-weight: 700;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex; align-items: center; justify-content: center; gap: 0.4rem;
  }
  .btn-capture:active { transform: scale(0.97); }
  .btn-camera { background: var(--red); color: var(--white); }
  .btn-gallery { background: rgba(255,255,255,0.1); color: var(--white); }

  /* ── CROP TOGGLE ─────────────────────────────── */
  .crop-toggle {
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(255,255,255,0.05);
    border-radius: 10px;
    padding: 0.7rem 1rem;
    cursor: pointer;
    margin-top: 0.6rem;
    transition: background 0.2s;
  }
  .crop-toggle:active { background: rgba(255,255,255,0.09); }
  .crop-toggle-label {
    font-family: var(--font-display);
    font-size: 0.9rem; font-weight: 600;
    display: flex; align-items: center; gap: 0.5rem;
  }
  .toggle-pill {
    width: 40px; height: 22px;
    background: rgba(255,255,255,0.15);
    border-radius: 11px;
    position: relative;
    transition: background 0.2s;
    flex-shrink: 0;
  }
  .toggle-pill.on { background: var(--gold); }
  .toggle-pill::after {
    content: '';
    position: absolute;
    width: 16px; height: 16px;
    background: var(--white);
    border-radius: 50%;
    top: 3px; left: 3px;
    transition: transform 0.2s;
    box-shadow: 0 1px 4px rgba(0,0,0,0.3);
  }
  .toggle-pill.on::after { transform: translateX(18px); }

  /* ── CROP EDITOR ─────────────────────────────── */
  #cropEditor {
    display: none;
    margin-top: 0.75rem;
    background: rgba(0,0,0,0.4);
    border-radius: 12px;
    padding: 0.75rem;
  }
  #cropEditor.visible { display: block; }
  #cropContainer {
    position: relative;
    overflow: hidden;
    border-radius: 8px;
    touch-action: none;
    cursor: crosshair;
    background: #000;
  }
  #cropImg {
    width: 100%;
    display: block;
    opacity: 0.7;
    pointer-events: none;
  }
  #cropOverlay {
    position: absolute;
    border: 2px solid var(--gold);
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.55);
    cursor: move;
    touch-action: none;
  }
  .crop-hint {
    font-size: 0.72rem; color: var(--gray-400);
    text-align: center; margin-top: 0.5rem;
  }
  .btn-apply-crop {
    width: 100%;
    margin-top: 0.6rem;
    padding: 0.7rem;
    background: var(--gold);
    color: var(--navy);
    border: none; border-radius: 9px;
    font-family: var(--font-display);
    font-size: 1rem; font-weight: 800;
    cursor: pointer;
    letter-spacing: 0.05em;
  }

  /* ── DESIGN MODE EXTRAS ──────────────────────── */
  #designExtras { display: none; }
  #designExtras.visible { display: block; }

  .template-grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 0.6rem;
  }
  .template-btn {
    background: rgba(255,255,255,0.06);
    border: 1.5px solid rgba(255,255,255,0.1);
    border-radius: 11px;
    padding: 0.6rem;
    cursor: pointer;
    transition: all 0.18s ease;
    color: var(--white);
    text-align: center;
    display: flex; flex-direction: column; align-items: center; gap: 0.4rem;
  }
  .template-btn.active {
    border-color: var(--gold);
    background: rgba(255,209,0,0.1);
  }
  .template-preview {
    width: 100%; aspect-ratio: 3/2;
    background: linear-gradient(135deg, var(--navy-light), var(--navy));
    border-radius: 7px;
    display: flex; align-items: flex-end;
    overflow: hidden;
    position: relative;
  }
  .template-preview-bar {
    width: 100%;
    padding: 0.3rem 0.4rem;
    font-family: var(--font-display);
    font-size: 0.55rem; font-weight: 800;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .template-btn-name {
    font-family: var(--font-display);
    font-size: 0.8rem; font-weight: 700;
    color: var(--gray-400);
  }
  .template-btn.active .template-btn-name { color: var(--gold); }

  /* ── TEXT INPUT ──────────────────────────────── */
  .text-field-wrap { position: relative; }
  #overlayText {
    width: 100%;
    background: rgba(255,255,255,0.07);
    border: 1.5px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 0.8rem 1rem;
    color: var(--white);
    font-family: var(--font-display);
    font-size: 1rem; font-weight: 600;
    resize: none; outline: none;
    transition: border-color 0.2s;
    line-height: 1.4;
  }
  #overlayText:focus { border-color: var(--gold); }
  #overlayText::placeholder { color: var(--gray-600); }
  .word-count {
    position: absolute; bottom: 0.5rem; right: 0.75rem;
    font-size: 0.7rem; color: var(--gray-400);
  }
  .word-count.warn { color: var(--red); }

  /* ── SAVE BUTTON ─────────────────────────────── */
  .btn-save {
    width: 100%;
    margin-top: 1.25rem;
    padding: 1rem;
    background: var(--red);
    color: var(--white);
    border: none; border-radius: 12px;
    font-family: var(--font-display);
    font-size: 1.2rem; font-weight: 800;
    letter-spacing: 0.06em;
    cursor: pointer;
    transition: all 0.18s ease;
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
    box-shadow: 0 4px 20px rgba(227,6,19,0.3);
  }
  .btn-save:active { transform: scale(0.98); }
  .btn-save:disabled { background: var(--gray-600); box-shadow: none; cursor: default; }

  /* ── TOAST ───────────────────────────────────── */
  #toast {
    position: fixed; bottom: calc(1.5rem + var(--safe-bottom));
    left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--success);
    color: var(--white);
    padding: 0.7rem 1.4rem;
    border-radius: 50px;
    font-family: var(--font-display);
    font-size: 0.95rem; font-weight: 700;
    letter-spacing: 0.04em;
    pointer-events: none;
    opacity: 0;
    transition: all 0.3s ease;
    z-index: 999;
    white-space: nowrap;
  }
  #toast.show {
    opacity: 1; transform: translateX(-50%) translateY(0);
  }

  /* ── HIDDEN INPUTS ───────────────────────────── */
  input[type="file"] { display: none; }

  /* ── SCROLLBAR ───────────────────────────────── */
  ::-webkit-scrollbar { width: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

  /* ── LOADING OVERLAY ─────────────────────────── */
  #loadingOverlay {
    display: none;
    position: fixed; inset: 0; z-index: 500;
    background: rgba(10,35,76,0.85);
    align-items: center; justify-content: center;
    flex-direction: column; gap: 1rem;
  }
  #loadingOverlay.show { display: flex; }
  .spinner {
    width: 40px; height: 40px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-txt {
    font-family: var(--font-display);
    font-size: 0.9rem; font-weight: 600;
    color: var(--gray-400); letter-spacing: 0.08em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<!-- ACCESS GATE -->
<div id="gate">
  <div class="gate-logo">
    <svg viewBox="0 0 44 44" fill="none">
      <rect x="4" y="4" width="16" height="16" rx="3" fill="white"/>
      <rect x="24" y="4" width="16" height="16" rx="3" fill="white" opacity="0.6"/>
      <rect x="4" y="24" width="16" height="16" rx="3" fill="white" opacity="0.6"/>
      <rect x="24" y="24" width="16" height="16" rx="3" fill="white" opacity="0.3"/>
    </svg>
  </div>
  <div class="gate-title">MEGA<span style="color:var(--gold)">CAM</span></div>
  <div class="gate-sub">Meganoticias · Uso interno</div>
  <div class="gate-error" id="gateError">Acceso no autorizado</div>
</div>

<!-- LOADING -->
<div id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-txt">Procesando imagen…</div>
</div>

<!-- APP -->
<div id="app">

  <div class="app-header">
    <div class="header-logo">
      <div class="header-logo-mark">
        <svg viewBox="0 0 20 20" fill="none">
          <rect x="2" y="2" width="7" height="7" rx="1.5" fill="white"/>
          <rect x="11" y="2" width="7" height="7" rx="1.5" fill="white" opacity="0.6"/>
          <rect x="2" y="11" width="7" height="7" rx="1.5" fill="white" opacity="0.6"/>
          <rect x="11" y="11" width="7" height="7" rx="1.5" fill="white" opacity="0.3"/>
        </svg>
      </div>
      <div class="header-title">MEGA<span>CAM</span></div>
    </div>
  </div>

  <div class="mode-tabs">
    <button class="mode-tab active" id="tabRapido" onclick="setMode('rapido')">
      <span class="tab-icon">⚡</span> MODO RÁPIDO
    </button>
    <button class="mode-tab" id="tabDiseno" onclick="setMode('diseno')">
      <span class="tab-icon">🎨</span> MODO DISEÑO
    </button>
  </div>

  <div class="app-content">

    <!-- PRESETS -->
    <div class="section-label">Formato de salida</div>
    <div class="preset-grid" id="presetGrid">
      <!-- generado por JS -->
    </div>

    <!-- CAPTURE ZONE -->
    <div class="section-label">Foto</div>
    <div class="capture-zone" id="captureZone" style="aspect-ratio: 3/2;">
      <div class="capture-placeholder" id="capturePlaceholder">
        <span class="icon">📷</span>
        <div class="label">Toca para agregar foto</div>
        <div class="sub">Cámara o galería</div>
      </div>
      <canvas id="previewCanvas"></canvas>
    </div>

    <div class="capture-actions">
      <button class="btn-capture btn-camera" onclick="openCamera()">📷 Cámara</button>
      <button class="btn-capture btn-gallery" onclick="openGallery()">🖼 Galería</button>
    </div>

    <!-- CROP TOGGLE -->
    <div class="crop-toggle" id="cropToggle" onclick="toggleCrop()">
      <div class="crop-toggle-label">✂️ Recorte manual</div>
      <div class="toggle-pill" id="cropPill"></div>
    </div>

    <!-- CROP EDITOR -->
    <div id="cropEditor">
      <div id="cropContainer">
        <img id="cropImg" src="" alt="">
        <div id="cropOverlay"></div>
      </div>
      <div class="crop-hint">Arrastra el recuadro para elegir el área</div>
      <button class="btn-apply-crop" onclick="applyCrop()">✓ Aplicar recorte</button>
    </div>

    <!-- DESIGN EXTRAS -->
    <div id="designExtras">
      <div class="section-label">Texto <span style="color:var(--gray-400);font-weight:400;text-transform:none;letter-spacing:0">(12–15 palabras)</span></div>
      <div class="text-field-wrap">
        <textarea id="overlayText" rows="3" placeholder="Escribe el titular o texto de la nota…" oninput="updateWordCount()"></textarea>
        <div class="word-count" id="wordCount">0 palabras</div>
      </div>
    </div>

    <!-- SAVE -->
    <button class="btn-save" id="btnSave" onclick="saveImage()" disabled>
      💾 GUARDAR EN GALERÍA
    </button>

  </div><!-- /app-content -->
</div><!-- /app -->

<!-- Hidden inputs -->
<input type="file" id="inputCamera" accept="image/*" capture="environment">
<input type="file" id="inputGallery" accept="image/*">

<div id="toast">✓ Imagen guardada</div>

<script>
// ── CONFIG ────────────────────────────────────────────────────────────────
const VALID_PIN = '234891';

const PRESETS = [
  { id: 'portal',  name: 'Portal / Google News', dims: '1200×800',  w: 1200, h: 800,  ratio: 3/2,   ratioLabel: '3:2'  },
  { id: 'fbig',    name: 'FB / IG Feed',          dims: '1080×1350', w: 1080, h: 1350, ratio: 4/5,   ratioLabel: '4:5'  },
  { id: 'story',   name: 'Story / TikTok',        dims: '1080×1920', w: 1080, h: 1920, ratio: 9/16,  ratioLabel: '9:16' },
  { id: 'twitter', name: 'Twitter / X',           dims: '1080×1080', w: 1080, h: 1080, ratio: 1,     ratioLabel: '1:1'  },

// ── TOKEN CHECK ───────────────────────────────────────────────────────────
function checkToken() {
  // Si ya ingresó el PIN antes en este dispositivo, pasar directo
  if (localStorage.getItem('mc_auth') === 'ok') {
    unlockApp();
  }
  // Si no, mostrar el gate con campo de PIN
}

function submitPin() {
  const pin = document.getElementById('pinInput').value.trim();
  if (pin === VALID_PIN) {
    localStorage.setItem('mc_auth', 'ok');
    unlockApp();
  } else {
    document.getElementById('gateError').classList.add('show');
    document.getElementById('pinInput').value = '';
    document.getElementById('pinInput').focus();
  }
}

function unlockApp() {
  const gate = document.getElementById('gate');
  const app  = document.getElementById('app');
  if (gate) gate.classList.add('hidden');
  if (app)  app.classList.add('visible');
  setTimeout(() => { if (gate && gate.parentNode) gate.parentNode.removeChild(gate); }, 500);
}

// ── BUILD UI ──────────────────────────────────────────────────────────────
function buildPresets() {
  const grid = document.getElementById('presetGrid');
  grid.innerHTML = PRESETS.map(p => {
    const isV = p.ratio < 1;
    const tw  = isV ? 24 : 40;
    const th  = isV ? 40 : Math.round(40 / p.ratio);
    const th2 = Math.min(th, 40);
    const tw2 = isV ? Math.round(th2 * p.ratio) : tw;
    return `
    <button class="preset-btn${p.id === currentPreset.id ? ' active' : ''}"
            onclick="selectPreset('${p.id}')">
      <div class="preset-thumb" style="width:${tw2}px;height:${th2}px">${p.ratioLabel}</div>
      <div class="preset-info">
        <div class="preset-name">${p.name}</div>
        <div class="preset-dims">${p.dims}px</div>
      </div>
    </button>`;
  }).join('');
}



// ── MODE ──────────────────────────────────────────────────────────────────
function setMode(mode) {
  currentMode = mode;
  document.getElementById('tabRapido').classList.toggle('active', mode === 'rapido');
  document.getElementById('tabDiseno').classList.toggle('active', mode === 'diseno');
  document.getElementById('designExtras').classList.toggle('visible', mode === 'diseno');
  updatePreview();
}

// ── PRESET ────────────────────────────────────────────────────────────────
function selectPreset(id) {
  currentPreset = PRESETS.find(p => p.id === id);
  buildPresets();
  updateCaptureAspect();
  if (sourceImage) updatePreview();
  if (cropActive) setupCropOverlay();
}

function updateCaptureAspect() {
  const zone = document.getElementById('captureZone');
  zone.style.aspectRatio = `${currentPreset.w} / ${currentPreset.h}`;
}



// ── IMAGE INPUT ───────────────────────────────────────────────────────────
function openCamera()  { document.getElementById('inputCamera').click(); }
function openGallery() { document.getElementById('inputGallery').click(); }

['inputCamera','inputGallery'].forEach(id => {
  document.getElementById(id).addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = '';
    const reader = new FileReader();
    reader.onload = ev => {
      const img = new Image();
      img.onload = () => {
        sourceImage = img;
        hasImage = true;
        document.getElementById('capturePlaceholder').style.display = 'none';
        document.getElementById('previewCanvas').classList.add('visible');
        document.getElementById('captureZone').classList.add('has-image');
        document.getElementById('btnSave').disabled = false;
        if (cropActive) setupCropEditor();
        updatePreview();
      };
      img.src = ev.target.result;
    };
    reader.readAsDataURL(file);
  });
});

// ── PREVIEW ───────────────────────────────────────────────────────────────
function updatePreview() {
  if (!sourceImage) return;
  const canvas  = document.getElementById('previewCanvas');
  const ctx     = canvas.getContext('2d');
  const { w, h } = currentPreset;
  canvas.width  = w;
  canvas.height = h;

  if (currentMode === 'rapido' || !PHOTO_ZONES[currentPreset.id]) {
    // Modo Rápido: foto limpia, recorte centrado
    drawCropped(ctx, sourceImage, w, h);
  } else {
    // Modo Diseño: foto solo en la zona definida por el template
    const zone = PHOTO_ZONES[currentPreset.id];
    const scaleX = w / zone.cw;
    const scaleY = h / zone.ch;
    const px = zone.px * scaleX;
    const py = zone.py * scaleY;
    const pw = zone.pw * scaleX;
    const ph = zone.ph * scaleY;
    drawCropped(ctx, sourceImage, pw, ph, px, py);
    drawTemplate(ctx, w, h);
  }
}

function drawCropped(ctx, img, tw, th, dx=0, dy=0) {
  const scale = Math.max(tw / img.naturalWidth, th / img.naturalHeight);
  const sw    = tw / scale;
  const sh    = th / scale;
  const sx    = (img.naturalWidth  - sw) / 2;
  const sy    = (img.naturalHeight - sh) / 2;
  ctx.drawImage(img, sx, sy, sw, sh, dx, dy, tw, th);
}

function drawTemplate(ctx, w, h) {
  const pid = currentPreset.id;
  const svgSrc = TEMPLATE_SVGS[pid];
  if (!svgSrc) return; // portal mode — no template

  const zone = PHOTO_ZONES[pid];
  const safe = SAFE_AREAS[pid];
  if (!zone || !safe) return;

  // Scale factors from SVG coords to canvas coords
  const scaleX = w / zone.cw;
  const scaleY = h / zone.ch;

  // Draw SVG overlay on top
  const svgImg = new Image();
  svgImg.onload = () => {
    ctx.drawImage(svgImg, 0, 0, w, h);
    // Draw text after SVG is painted
    drawOverlayText(ctx, w, h, safe, scaleX, scaleY);
  };
  svgImg.src = svgSrc;
}

function drawOverlayText(ctx, w, h, safe, scaleX, scaleY) {
  const txt = document.getElementById('overlayText').value.trim();
  if (!txt) return;

  const sx = safe.sx * scaleX;
  const sy = safe.sy * scaleY;
  const sw = safe.sw * scaleX;
  const sh = safe.sh * scaleY;

  // Auto font size: start large, shrink to fit
  let fontSize = Math.round(sh * 0.28);
  ctx.font = `700 ${fontSize}px 'Montserrat', 'Barlow Condensed', sans-serif`;
  let lines = wrapText(ctx, txt, sw * 0.92);
  while (lines.length * fontSize * 1.25 > sh * 0.88 && fontSize > 24) {
    fontSize -= 2;
    ctx.font = `700 ${fontSize}px 'Montserrat', 'Barlow Condensed', sans-serif`;
    lines = wrapText(ctx, txt, sw * 0.92);
  }

  const lineH   = fontSize * 1.25;
  const totalH  = lines.length * lineH;
  const startY  = sy + (sh - totalH) / 2 + lineH * 0.75;

  ctx.fillStyle = safe.textColor;
  ctx.textAlign = 'left';
  ctx.textBaseline = 'alphabetic';
  lines.forEach((line, i) => {
    ctx.fillText(line, sx + sw * 0.04, startY + i * lineH);
  });
}

function wrapText(ctx, text, maxW) {
  const words = text.split(' ');
  const lines = [];
  let line    = '';
  words.forEach(word => {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxW && line) {
      lines.push(line);
      line = word;
    } else {
      line = test;
    }
  });
  if (line) lines.push(line);
  return lines;
}

function drawLogoMN(ctx, w, h) {
  const size = Math.round(w * 0.07);
  const pad  = Math.round(w * 0.025);
  const x    = w - size - pad;
  const y    = pad;
  ctx.save();
  ctx.shadowColor = 'rgba(0,0,0,0.5)';
  ctx.shadowBlur  = 8;
  // Red rounded rect
  const r = size * 0.18;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + size - r, y);
  ctx.quadraticCurveTo(x + size, y, x + size, y + r);
  ctx.lineTo(x + size, y + size - r);
  ctx.quadraticCurveTo(x + size, y + size, x + size - r, y + size);
  ctx.lineTo(x + r, y + size);
  ctx.quadraticCurveTo(x, y + size, x, y + size - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fillStyle = '#E30613';
  ctx.fill();
  ctx.restore();
  // MN text
  ctx.save();
  ctx.font = `900 ${Math.round(size * 0.5)}px Arial Black, sans-serif`;
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('MN', x + size / 2, y + size / 2);
  ctx.restore();
}

// ── CROP ──────────────────────────────────────────────────────────────────
function toggleCrop() {
  cropActive = !cropActive;
  document.getElementById('cropPill').classList.toggle('on', cropActive);
  const editor = document.getElementById('cropEditor');
  if (cropActive) {
    editor.classList.add('visible');
    if (sourceImage) setupCropEditor();
  } else {
    editor.classList.remove('visible');
    // Reset to auto crop
    updatePreview();
  }
}

function setupCropEditor() {
  const img = document.getElementById('cropImg');
  img.src   = sourceImage.src;
  img.onload = setupCropOverlay;
  if (img.complete) setupCropOverlay();
}

function setupCropOverlay() {
  const container = document.getElementById('cropContainer');
  const img       = document.getElementById('cropImg');
  const overlay   = document.getElementById('cropOverlay');
  const cw        = container.clientWidth || img.clientWidth;
  const ch        = img.clientHeight || cw * (sourceImage.naturalHeight / sourceImage.naturalWidth);
  container.style.height = ch + 'px';

  const targetRatio = currentPreset.w / currentPreset.h;
  let bw, bh;
  if (cw / ch > targetRatio) {
    bh = ch * 0.85;
    bw = bh * targetRatio;
  } else {
    bw = cw * 0.85;
    bh = bw / targetRatio;
  }
  cropBox = {
    x: (cw - bw) / 2,
    y: (ch - bh) / 2,
    w: bw,
    h: bh
  };
  updateOverlay();
  attachCropEvents(container, overlay, img);
}

function updateOverlay() {
  const o = document.getElementById('cropOverlay');
  o.style.left   = cropBox.x + 'px';
  o.style.top    = cropBox.y + 'px';
  o.style.width  = cropBox.w + 'px';
  o.style.height = cropBox.h + 'px';
}

function attachCropEvents(container, overlay) {
  overlay.onmousedown = overlay.ontouchstart = startDrag;

  function startDrag(e) {
    e.preventDefault();
    const pt = e.touches ? e.touches[0] : e;
    const cr = overlay.getBoundingClientRect();
    cropDrag = { active: true, startX: pt.clientX - cr.left, startY: pt.clientY - cr.top };
  }

  container.onmousemove = container.ontouchmove = moveDrag;
  container.onmouseup   = container.ontouchend  = () => { cropDrag.active = false; };

  function moveDrag(e) {
    if (!cropDrag.active) return;
    e.preventDefault();
    const pt = e.touches ? e.touches[0] : e;
    const cr = container.getBoundingClientRect();
    let nx = pt.clientX - cr.left - cropDrag.startX;
    let ny = pt.clientY - cr.top  - cropDrag.startY;
    nx = Math.max(0, Math.min(nx, cr.width  - cropBox.w));
    ny = Math.max(0, Math.min(ny, cr.height - cropBox.h));
    cropBox.x = nx;
    cropBox.y = ny;
    updateOverlay();
  }
}

function applyCrop() {
  if (!sourceImage) return;
  const container = document.getElementById('cropContainer');
  const cr        = container.getBoundingClientRect();
  const scaleX    = sourceImage.naturalWidth  / cr.width;
  const scaleY    = sourceImage.naturalHeight / cr.height;
  const sx        = cropBox.x * scaleX;
  const sy        = cropBox.y * scaleY;
  const sw        = cropBox.w * scaleX;
  const sh        = cropBox.h * scaleY;

  const canvas = document.createElement('canvas');
  canvas.width  = currentPreset.w;
  canvas.height = currentPreset.h;
  canvas.getContext('2d').drawImage(sourceImage, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);

  const croppedImg = new Image();
  croppedImg.onload = () => {
    sourceImage = croppedImg;
    document.getElementById('cropEditor').classList.remove('visible');
    document.getElementById('cropPill').classList.remove('on');
    cropActive = false;
    updatePreview();
  };
  croppedImg.src = canvas.toDataURL('image/jpeg', 0.95);
}

// ── WORD COUNT ────────────────────────────────────────────────────────────
function updateWordCount() {
  const words = document.getElementById('overlayText').value.trim().split(/\s+/).filter(Boolean).length;
  const el    = document.getElementById('wordCount');
  el.textContent = words + (words === 1 ? ' palabra' : ' palabras');
  el.classList.toggle('warn', words > 15);
  updatePreview();
}

// ── SAVE ──────────────────────────────────────────────────────────────────
async function saveImage() {
  if (!sourceImage) return;
  showLoading(true);
  await new Promise(r => setTimeout(r, 30));

  const { w, h } = currentPreset;
  const pid = currentPreset.id;
  const quality = currentMode === 'rapido' ? 0.82 : 0.85;

  const canvas = document.createElement('canvas');
  canvas.width  = w;
  canvas.height = h;
  const ctx = canvas.getContext('2d');

  if (currentMode === 'rapido' || !PHOTO_ZONES[pid]) {
    drawCropped(ctx, sourceImage, w, h);
    exportCanvas(canvas, pid, quality);
  } else {
    // Design mode: photo in zone, then SVG overlay, then text
    const zone = PHOTO_ZONES[pid];
    const safe = SAFE_AREAS[pid];
    const scaleX = w / zone.cw;
    const scaleY = h / zone.ch;
    const px = zone.px * scaleX;
    const py = zone.py * scaleY;
    const pw = zone.pw * scaleX;
    const ph = zone.ph * scaleY;
    drawCropped(ctx, sourceImage, pw, ph, px, py);

    const svgImg = new Image();
    svgImg.onload = () => {
      ctx.drawImage(svgImg, 0, 0, w, h);
      drawOverlayText(ctx, w, h, safe, scaleX, scaleY);
      exportCanvas(canvas, pid, quality);
    };
    svgImg.src = TEMPLATE_SVGS[pid];
  }
}

function exportCanvas(canvas, pid, quality) {
  canvas.toBlob(blob => {
    showLoading(false);
    const url = URL.createObjectURL(blob);
    const a   = document.createElement('a');
    a.href    = url;
    a.download = `megacam_${pid}_${Date.now()}.jpg`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('✓ Imagen lista para guardar');
  }, 'image/jpeg', quality);
}

function showLoading(v) {
  document.getElementById('loadingOverlay').classList.toggle('show', v);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ── INIT ──────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', function() {
  checkToken();
  buildPresets();
  updateCaptureAspect();

  // PWA manifest dinámico
  try {
    const iconSvg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
      <rect width="512" height="512" rx="100" fill="#E30613"/>
      <rect x="60" y="60" width="392" height="392" rx="70" fill="none" stroke="white" stroke-width="24"/>
      <text x="256" y="330" font-family="Arial Black,sans-serif" font-size="200" font-weight="900" text-anchor="middle" fill="white">MN</text>
    </svg>`;
    const iconB64 = 'data:image/svg+xml;base64,' + btoa(unescape(encodeURIComponent(iconSvg)));
    const manifestData = {
      name: "MegaCam — Meganoticias",
      short_name: "MegaCam",
      description: "App de fotografía para reporteros Meganoticias",
      start_url: "./",
      display: "standalone",
      background_color: "#0a234c",
      theme_color: "#0a234c",
      orientation: "portrait",
      icons: [
        { src: iconB64, sizes: "192x192", type: "image/svg+xml" },
        { src: iconB64, sizes: "512x512", type: "image/svg+xml" }
      ]
    };
    const blob = new Blob([JSON.stringify(manifestData)], {type: 'application/manifest+json'});
    const el = document.getElementById('pwa-manifest');
    if (el) el.href = URL.createObjectURL(blob);
  } catch(e) { console.warn('Manifest error:', e); }
});
